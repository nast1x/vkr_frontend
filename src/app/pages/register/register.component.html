<img src="/assets/images/boy-swimming.png" alt="Jogging" class="fixed-logo-left">
<img src="/assets/images/boy-swimming.png" alt="Jogging" class="fixed-logo-right">

<div class="register-container">

  <!-- Шапка -->
  <div class="register-header">
    <button class="register-back" (click)="goBack()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <h1 class="register-title">Регистрация</h1>
  </div>

  <!-- Форма -->
  <form class="register-form" (ngSubmit)="onSubmit()">
    <div class="register-input-group">
      <label class="register-label">Фамилия</label>
      <input
        type="text"
        class="register-input"
        placeholder="Введите фамилию"
        [(ngModel)]="lastName"
        name="lastName"
        required
      >
    </div>

    <div class="register-input-group">
      <label class="register-label">Имя</label>
      <input
        type="text"
        class="register-input"
        placeholder="Введите имя"
        [(ngModel)]="firstName"
        name="firstName"
        required
      >
    </div>

    <div class="register-input-group">
      <label class="register-label">Отчество</label>
      <input
        type="text"
        class="register-input"
        placeholder="Введите отчество"
        [(ngModel)]="middleName"
        name="middleName"
      >
    </div>

    <!-- Email -->
    <div class="register-input-group">
      <label class="register-label">Почта</label>
      <input
        type="email"
        class="register-input"
        placeholder="Введите вашу почту"
        [(ngModel)]="email"
        name="email"
        required
      >
    </div>

    <!-- Пароль -->
    <div class="register-input-group">
      <label class="register-label">Пароль</label>
      <div class="register-password-wrapper">
        <input
          [type]="showPassword ? 'text' : 'password'"
          class="register-input"
          placeholder="Придумайте пароль"
          [(ngModel)]="password"
          name="password"
          required
        >
        <button type="button" class="register-password-toggle" (click)="togglePassword()">
          <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
          </svg>
          <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20C5 20 1 12 1 12C1 12 2.24 9.34 4.38 7.22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M1 1L23 23" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20.84 13.38C21.92 12.82 23 12 23 12C23 12 19 20 12 20C10.34 20 8.82 19.62 7.44 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Подтверждение пароля -->
    <div class="register-input-group">
      <label class="register-label">Подтвердите пароль</label>
      <div class="register-password-wrapper">
        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          class="register-input"
          placeholder="Повторите пароль"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
        >
        <button type="button" class="register-password-toggle" (click)="toggleConfirmPassword()">
          <svg *ngIf="!showConfirmPassword" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
          </svg>
          <svg *ngIf="showConfirmPassword" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20C5 20 1 12 1 12C1 12 2.24 9.34 4.38 7.22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M1 1L23 23" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20.84 13.38C21.92 12.82 23 12 23 12C23 12 19 20 12 20C10.34 20 8.82 19.62 7.44 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Кнопка регистрации -->
    <button type="submit" class="register-btn-primary" [disabled]="!isFormValid()">
      Зарегистрироваться
    </button>

  </form>

  <!-- Вход -->
  <p class="register-login-text">Уже есть аккаунт?</p>

  <button class="register-btn-secondary" (click)="onGoToLogin()">
    Авторизоваться
  </button>

</div>
