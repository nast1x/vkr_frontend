<img src="/assets/images/boy-swimming.png" alt="Jogging" class="fixed-logo-left">
<img src="/assets/images/boy-swimming.png" alt="Jogging" class="fixed-logo-right">

<div class="login-container">

  <!-- Шапка -->
  <div class="login-header">
    <button class="login-back" (click)="goBack()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <h1 class="login-title">Авторизация</h1>
  </div>

  <!-- Форма -->
  <form class="login-form" (ngSubmit)="onSubmit()">

    <!-- Email -->
    <div class="login-input-group">
      <label class="login-label">Почта</label>
      <input
        type="email"
        class="login-input"
        placeholder="Введите вашу почту"
        [(ngModel)]="email"
        name="email"
        required
      >
    </div>

    <!-- Пароль -->
    <div class="login-input-group">
      <label class="login-label">Пароль</label>
      <div class="login-password-wrapper">
        <input
          [type]="showPassword ? 'text' : 'password'"
          class="login-input"
          placeholder="Введите пароль"
          [(ngModel)]="password"
          name="password"
          required
        >
        <button type="button" class="login-password-toggle" (click)="togglePassword()">
          <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
          </svg>
          <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20C5 20 1 12 1 12C1 12 2.24 9.34 4.38 7.22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M1 1L23 23" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20.84 13.38C21.92 12.82 23 12 23 12C23 12 19 20 12 20C10.34 20 8.82 19.62 7.44 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Забыли пароль -->
    <div class="login-forgot">
      <a class="login-forgot-link" (click)="onForgotPassword()">Забыли пароль?</a>
    </div>

    <!-- Кнопка входа -->
    <button type="submit" class="login-btn-primary" [disabled]="!email || !password">
      Войти
    </button>

  </form>

  <!-- Регистрация -->
  <p class="login-register-text">Нет аккаунта?</p>

  <button class="login-btn-secondary" (click)="onGoToRegister()">
    Зарегистрироваться
  </button>

</div>
